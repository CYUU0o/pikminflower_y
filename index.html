<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIKMIN 路徑編輯器</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>PIKMIN 路徑編輯器</h2>

<textarea id="coords" placeholder="25.033150, 121.561395
25.032771, 121.566084
(記得換行)"></textarea>

<div class="buttons">
<input type="file" id="gpxFile" accept=".gpx">

<button id="importBtn" onclick="importGPX()">匯入 GPX</button>
<button id="loadBtn" onclick="loadPoints()">載入座標</button>
<button id="autoBtn" onclick="autoClose()">路徑閉合</button>
<button id="downloadBtn" onclick="downloadGPX()">下載 GPX</button>
</div>

<div class="panel">
速度 km/h
<input id="speed" value="5">
<div>點數: <span id="count">0</span></div>
<div>距離: <span id="distance">0</span> km</div>
<div>時間: <span id="time">0</span> 分鐘</div>
</div>

<div class="layout">
<div id="map"></div>
<div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="app.js"></script>

</body>

</html>
